<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #d0d3d7; --panel: #f2f3f5; --panel2: #e8eaed;
  --border: #b4bac2; --border-dark: #8a9199;
  --accent: #2e3c4e; --accent2: #5b8db8;
  --text: #18222e; --text-dim: #7a8694;
  --green: #2e8a56; --shadow: rgba(30,45,60,0.13); --shine: rgba(255,255,255,0.7);
}
html { scroll-behavior: smooth; }
body {
  width: 100vw; min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 15% 10%, #e8ecf0 0%, transparent 55%), radial-gradient(ellipse at 85% 90%, #c4c9cf 0%, transparent 55%);
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }
.topnav {
  position: sticky; top: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: rgba(242,243,245,0.92); border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 16px var(--shadow); backdrop-filter: blur(12px); z-index: 100;
}
.nav-back { font-size: 0.32rem; color: var(--text-dim); letter-spacing: 1.5px; text-decoration: none; transition: color 0.2s; }
.nav-back:hover { color: var(--accent2); }
.page { max-width: 860px; margin: 0 auto; padding: 48px 24px 60px; display: flex; flex-direction: column; gap: 40px; }
.section-label { font-size: 0.3rem; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 14px; padding-left: 10px; border-left: 2px solid var(--accent2); }
.inv-layout { display: grid; grid-template-columns: 1fr 260px; gap: 16px; align-items: start; }
.inv-grid {
  background: var(--panel); border: 1px solid var(--border);
  box-shadow: 0 2px 12px var(--shadow), inset 0 1px 0 var(--shine);
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 12px;
}
.inv-slot {
  aspect-ratio: 1; background: var(--panel2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.inv-slot img { width: 60%; height: 60%; image-rendering: pixelated; object-fit: contain; }
.inv-slot:not(.empty):hover { background: var(--bg); border-color: var(--accent2); transform: scale(1.04); }
.inv-slot.selected { border-color: var(--accent2); background: rgba(91,141,184,0.1); box-shadow: inset 0 0 0 2px var(--accent2); }
.inv-slot.empty { cursor: default; }
.inv-sidebar {
  background: var(--panel); border: 1px solid var(--border);
  box-shadow: 0 2px 12px var(--shadow), inset 0 1px 0 var(--shine);
  padding: 20px; display: flex; flex-direction: column; gap: 14px;
}
.sidebar-title { font-size: 0.3rem; color: var(--text-dim); letter-spacing: 2px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.sel-icon { display: flex; align-items: center; justify-content: center; padding: 12px 0; }
.sel-icon img { width: 80px; height: 80px; image-rendering: pixelated; object-fit: contain; }
.sel-name { font-size: 0.38rem; color: var(--text); text-align: center; letter-spacing: 1px; line-height: 2; }
.sel-rarity { font-size: 0.3rem; text-align: center; letter-spacing: 1.5px; padding: 8px; border: 1px solid; background: var(--panel2); }
.sel-empty { font-size: 0.28rem; color: var(--text-dim); text-align: center; letter-spacing: 1px; padding: 24px 0; line-height: 3; }
.page-footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  background: rgba(242,243,245,0.92); border-top: 1px solid var(--border);
  backdrop-filter: blur(8px); z-index: 100;
}
.footer-text { font-size: 0.26rem; color: var(--text-dim); letter-spacing: 1.5px; }
.status-right { display: flex; align-items: center; gap: 7px; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
</style>
</head>
<body>
<nav class="topnav">
  <a href="main.html"><img src="../images/canBet symbol sym..png" class="logo" alt="Logo"></a>
  <a href="main.html" class="nav-back">◀ Menu</a>
</nav>
<div class="page">
  <section>
    <div class="section-label">Your Inventory</div>
    <div class="inv-layout">
      <div class="inv-grid" id="grid"></div>
      <div class="inv-sidebar">
        <div class="sidebar-title">Selected Item</div>
        <div id="selContent"><div class="sel-empty">No item<br>selected</div></div>
      </div>
    </div>
  </section>
</div>
<footer class="page-footer">
  <span class="footer-text">CANBET v1.0 — INVENTORY</span>
  <div class="status-right"><span class="footer-text">ONLINE</span><div class="status-dot"></div></div>
</footer>
<script>
const BASE = '../../Sprites/Items/Spooky_collection/';

const items = [
  {img:BASE+'Angery Ghost.png',                    name:'Angery Ghost',                      rarity:'LEGENDARY', color:'#c8943a'},
  {img:BASE+'Cthulhu.png',                         name:'Cthulhu',                           rarity:'EPIC',      color:'#a855f7'},
  {img:BASE+'Vampire.png',                         name:'Vampire',                           rarity:'RARE',      color:'#5b8db8'},
  {img:BASE+'evil robot.png',                      name:'Evil Robot',                        rarity:'RARE',      color:'#5b8db8'},
  {img:BASE+'Flying spaghetti monster.png',        name:'Flying Spaghetti Monster',          rarity:'RARE',      color:'#5b8db8'},
  {img:BASE+'creature from the black lagoon.png',  name:'Creature from the Black Lagoon',    rarity:'RARE',      color:'#5b8db8'},
  {img:BASE+'Gargoyle.png',                        name:'Gargoyle',                          rarity:'COMMON',    color:'#2e8a56'},
  {img:BASE+'Happy Ghost.png',                     name:'Happy Ghost',                       rarity:'COMMON',    color:'#2e8a56'},
  {img:BASE+'mummy.png',                           name:'Mummy',                             rarity:'COMMON',    color:'#2e8a56'},
  {img:BASE+'zombie.png',                          name:'Zombie',                            rarity:'COMMON',    color:'#2e8a56'},
];

const SLOTS = 16;
const grid = document.getElementById('grid');

items.forEach(item => {
  const slot = document.createElement('div');
  slot.className = 'inv-slot';
  slot.innerHTML = `<img src="${item.img}" alt="${item.name}">`;
  slot.onclick = () => sel(slot, item);
  grid.appendChild(slot);
});

for (let i = items.length; i < SLOTS; i++) {
  const empty = document.createElement('div');
  empty.className = 'inv-slot empty';
  grid.appendChild(empty);
}

function sel(el, item) {
  document.querySelectorAll('.inv-slot').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('selContent').innerHTML =
    `<div class="sel-icon"><img src="${item.img}" alt="${item.name}"></div>`
    + `<div class="sel-name">${item.name}</div>`
    + `<div class="sel-rarity" style="color:${item.color};border-color:${item.color}">${item.rarity}</div>`;
}
</script>
</body>
</html>
