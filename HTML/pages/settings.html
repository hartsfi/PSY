<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #d0d3d7; --panel: #f2f3f5; --panel2: #e8eaed;
  --border: #b4bac2; --border-dark: #8a9199;
  --accent: #2e3c4e; --accent2: #5b8db8;
  --text: #18222e; --text-dim: #7a8694;
  --green: #2e8a56; --shadow: rgba(30,45,60,0.13); --shine: rgba(255,255,255,0.7);
}
html { scroll-behavior: smooth; }
body {
  width: 100vw; min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 15% 10%, #e8ecf0 0%, transparent 55%), radial-gradient(ellipse at 85% 90%, #c4c9cf 0%, transparent 55%);
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }
.topnav {
  position: sticky; top: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: rgba(242,243,245,0.92); border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 16px var(--shadow); backdrop-filter: blur(12px); z-index: 100;
}
.nav-logo { font-size: 0.65rem; color: var(--accent); letter-spacing: 3px; text-decoration: none; }
.nav-back { font-size: 0.32rem; color: var(--text-dim); letter-spacing: 1.5px; text-decoration: none; transition: color 0.2s; }
.nav-back:hover { color: var(--accent2); }
.page { max-width: 580px; margin: 0 auto; padding: 48px 24px 60px; display: flex; flex-direction: column; gap: 40px; }
.section-label { font-size: 0.3rem; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 14px; padding-left: 10px; border-left: 2px solid var(--accent2); }
.settings-panel { border: 1px solid var(--border); box-shadow: 0 2px 12px var(--shadow); overflow: hidden; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; background: var(--panel); border-bottom: 1px solid var(--border);
  gap: 20px;
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 0.35rem; color: var(--text); letter-spacing: 1px; flex-shrink: 0; }
.setting-sub { font-size: 0.25rem; color: var(--text-dim); letter-spacing: 1px; margin-top: 5px; }
/* Slider */
.slider-wrap { flex: 1; max-width: 200px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.slider {
  width: 100%; -webkit-appearance: none; height: 4px;
  background: var(--border); outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--accent2); cursor: pointer; border: 2px solid var(--panel);
  box-shadow: 0 1px 4px var(--shadow);
}
.slider-val { font-size: 0.28rem; color: var(--accent2); letter-spacing: 1px; }
/* Toggle */
.toggle-btn {
  font-family: 'Press Start 2P', monospace; font-size: 0.32rem;
  padding: 8px 16px; cursor: pointer; letter-spacing: 1px;
  border: 1px solid var(--border); transition: all 0.15s;
  background: var(--green); color: white; border-color: var(--green);
}
.toggle-btn.off { background: var(--panel2); color: var(--text-dim); border-color: var(--border); }
.toggle-btn:hover { opacity: 0.85; }
/* Danger zone */
.danger-btn {
  font-family: 'Press Start 2P', monospace; font-size: 0.32rem;
  padding: 8px 16px; cursor: pointer; letter-spacing: 1px;
  background: var(--panel2); color: #b84040; border: 1px solid #d47070;
  transition: all 0.15s;
}
.danger-btn:hover { background: #b84040; color: white; border-color: #b84040; }
.page-footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  background: rgba(242,243,245,0.92); border-top: 1px solid var(--border);
  backdrop-filter: blur(8px); z-index: 100;
}
.footer-text { font-size: 0.26rem; color: var(--text-dim); letter-spacing: 1.5px; }
.status-right { display: flex; align-items: center; gap: 7px; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
</style>
</head>
<body>
<nav class="topnav">
  <a href="main.html"><img src="../images/canBet symbol sym..png" class="logo" alt="Logo"></a>
  <a href="main.html" class="nav-back">◀ Menu</a>
</nav>
<div class="page">
  <section>
    <div class="section-label">Audio</div>
    <div class="settings-panel">
      <div class="setting-row">
        <div><div class="setting-label">Master Volume</div><div class="setting-sub">Overall game audio</div></div>
        <div class="slider-wrap">
          <input type="range" class="slider" min="0" max="100" value="75" oninput="this.nextElementSibling.textContent=this.value+'%'">
          <span class="slider-val">75%</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">SFX Volume</div><div class="setting-sub">Sound effects</div></div>
        <div class="slider-wrap">
          <input type="range" class="slider" min="0" max="100" value="60" oninput="this.nextElementSibling.textContent=this.value+'%'">
          <span class="slider-val">60%</span>
        </div>
      </div>
    </div>
  </section>
  <section>
    <div class="section-label">Notifications</div>
    <div class="settings-panel">
      <div class="setting-row">
        <div><div class="setting-label">Popup Notifications</div><div class="setting-sub">Show item alerts</div></div>
        <button class="toggle-btn" onclick="toggle(this)">On</button>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">Rank Changes</div><div class="setting-sub">Leaderboard alerts</div></div>
        <button class="toggle-btn" onclick="toggle(this)">On</button>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">Shop Restocks</div><div class="setting-sub">New item alerts</div></div>
        <button class="toggle-btn off" onclick="toggle(this)">Off</button>
      </div>
    </div>
  </section>
  <section>
    <div class="section-label">Account</div>
    <div class="settings-panel">
      <div class="setting-row">
        <div><div class="setting-label">Reset Progress</div><div class="setting-sub">Clears all data</div></div>
        <button class="danger-btn">Reset</button>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">Log Out</div><div class="setting-sub">Return to login</div></div>
        <button class="danger-btn" onclick="window.location='login.html'">Logout</button>
      </div>
    </div>
  </section>
</div>
<footer class="page-footer">
  <span class="footer-text">CANBET v1.0 — SETTINGS</span>
  <div class="status-right"><span class="footer-text">ONLINE</span><div class="status-dot"></div></div>
</footer>
<script>
function toggle(btn) {
  const on = btn.textContent.trim() === 'On';
  btn.textContent = on ? 'Off' : 'On';
  btn.classList.toggle('off', on);
}
</script>
</body>
</html>
