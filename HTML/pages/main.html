<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Main Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background-color: #0a0a14;
  background-image: url('../images/mainbg_pixel.png');
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  image-rendering: pixelated;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* BACKGROUND handled by body background-image */

/* TOP NAV */
.topnav {
  width: 100%;
  display: flex;
  justify-content: space-between; /* logo on left, links on right */
  align-items: center;
  padding: 10px 20px;
  position: absolute;
  top: 0;
  z-index: 10;
}
.logo {
  height: 40px;
}
.nav-link {
  font-size: 0.45rem;
  color: #ddd;
  text-decoration: none;
  letter-spacing: 1px;
  background: rgba(0,0,0,0.3);
  padding: 4px 8px;
}
.nav-link:hover { color: white; }

/* MAIN LAYOUT */
.interface {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 50px 40px 30px;
}

/* NAV BUTTONS - pill shaped like the wireframe */
.nav-btn {
  display: block;
  text-decoration: none;
  font-family: 'Press Start 2P', monospace;
  /* doubled overall button scale */
  font-size: 0.975rem; /* 25% smaller than doubled value */
  color: #1a1a1a;
  letter-spacing: 1px;
  text-align: center;
  padding: 18px 45px;
  border-radius: 50px;
  /* dark purple buttons */
  background: #5d3a9b;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 300px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  /* shadow for purple buttons */
  box-shadow: 0 3px 0 #402664, 0 4px 8px rgba(0,0,0,0.4);
}
.nav-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 0 #402664, 0 6px 12px rgba(0,0,0,0.5);
}
.nav-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #402664;
}

/* ROW LAYOUT */
.row {
  display: flex;
  gap: 30px; /* adjusted for slightly smaller buttons */
  align-items: center;
  justify-content: center;
}

/* Diamond shape for Crates (now twice as big) */
.diamond-btn {
  /* another 25% up (≈187.5px, rounded to 188px) */
  width: 188px; height: 188px;
  background: #5d3a9b;
  transform: rotate(45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  /* diamond shadow adapted to purple tone */
  box-shadow: 3px 3px 0 #402664, 4px 5px 10px rgba(0,0,0,0.5);
  transition: all 0.15s;
  /* border for lavender diamond */
  border: 2px solid #8e79a0;
}
.diamond-btn:hover {
  transform: rotate(45deg) scale(1.05);
  box-shadow: 5px 5px 0 #402664;
}
.diamond-btn:active {
  transform: rotate(45deg) scale(0.97);
  /* active shadow color update */
  box-shadow: 3px 3px 0 #402664;
}
.diamond-inner {
  transform: rotate(-45deg);
  font-family: 'Press Start 2P', monospace;
  /* 87.5% larger than original 0.5rem */
  font-size: 0.875rem;
  color: #1a1a1a;
  text-align: center;
  letter-spacing: 0.5px;
  line-height: 1.5;
}

.nav-btn.profile-btn {
  background: #5d3a9b;
  box-shadow: 0 3px 0 #402664, 0 4px 8px rgba(0,0,0,0.4);
}
.nav-btn.profile-btn:hover {
  box-shadow: 0 5px 0 #2a8a4a, 0 6px 12px rgba(0,0,0,0.5);
}
</style>
</head>
<body>



<nav class="topnav">
  <a href="home.html"><img src="../images/logo.png" class="logo" alt="Logo"></a>
  <!-- home link replaced by logo -->
</nav>

<div class="interface">
  <!-- Row 1: Inventory | [space] | Leaderboards -->
  <div class="row">
    <a href="inventory.html" class="nav-btn">Inventory</a>
    <div style="width: 80px"></div>
    <a href="leaderboard.html" class="nav-btn">Leaderboards</a>
  </div>

  <!-- Row 2: [space] | Crates diamond | [space] -->
  <div class="row" style="margin: 8px 0;">
    <div style="width:200px;"></div>
    <a href="crate.html" class="diamond-btn">
      <span class="diamond-inner">Crates</span>
    </a>
    <div style="width:200px;"></div>
  </div>

  <!-- Row 3: Shop | [space] | Settings -->
  <div class="row">
    <a href="shop.html" class="nav-btn">Shop</a>
    <div style="width: 80px"></div>
    <a href="settings.html" class="nav-btn">Settings</a>
  </div>

  <!-- Row 4: Profile (centered, slightly right) -->
  <div class="row" style="justify-content: flex-end; padding-right: 20px;">
    <a href="profile.html" class="nav-btn profile-btn">Profile</a>
  </div>
</div>

</body>
</html>
