<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #c8a820;
  display: flex;
  flex-direction: column;
  position: relative;
}

.bg-image {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -webkit-image-rendering: pixelated;
}

/* SHOP CONTAINER */
.shop-container {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 16px;
}

/* ITEMS GRID — 2 rows of 3 */
.items-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 580px;
}

/* Each item card: yellow background with diamond */
.item-card {
  background: #f5e030;
  border: 3px solid #d4c010;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 8px 10px;
  gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
}
.item-card:hover {
  transform: translateY(-2px);
  box-shadow: 4px 5px 0 rgba(0,0,0,0.25);
}

/* Diamond shape */
.diamond-wrap {
  width: 48px; height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.diamond {
  width: 36px; height: 36px;
  background: #8b1010;
  transform: rotate(45deg);
  border: 2px solid #6a0a0a;
  box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.15);
  position: relative;
}
.diamond::after {
  content: '';
  position: absolute;
  top: 5px; left: 5px;
  width: 10px; height: 10px;
  background: rgba(255,255,255,0.25);
}

.item-price {
  font-size: 0.35rem;
  color: #333;
  letter-spacing: 0.5px;
  text-align: center;
  line-height: 1.6;
}

/* MENU BUTTON */
.menu-btn {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  background: #b8a0e0;
  color: #1a1a1a;
  border: 2px solid #9880c8;
  padding: 8px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-decoration: none;
  display: inline-block;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
}
.menu-btn:hover {
  background: #c8b0f0;
  transform: translateY(-1px);
}
</style>
</head>
<body>

<img class="bg-image" src="images/shopbg.png" alt="">

<div class="shop-container">
  <div class="items-grid">
    <!-- Row 1 -->
    <div class="item-card">
      <div class="diamond-wrap"><div class="diamond"></div></div>
      <div class="item-price">300 Bits</div>
    </div>
    <div class="item-card">
      <div class="diamond-wrap"><div class="diamond"></div></div>
      <div class="item-price">100 Bits</div>
    </div>
    <div class="item-card">
      <div class="diamond-wrap"><div class="diamond"></div></div>
      <div class="item-price">500 Bits</div>
    </div>
    <!-- Row 2 -->
    <div class="item-card">
      <div class="diamond-wrap"><div class="diamond"></div></div>
      <div class="item-price">800 Bits</div>
    </div>
    <div class="item-card">
      <div class="diamond-wrap"><div class="diamond"></div></div>
      <div class="item-price">50 Bits</div>
    </div>
    <div class="item-card">
      <div class="diamond-wrap"><div class="diamond"></div></div>
      <div class="item-price">300 Bits</div>
    </div>
  </div>
</div>

<a href="main_interface.html" class="menu-btn">Menu</a>

</body>
</html>
