<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #c8c8c8;
  display: flex;
  flex-direction: column;
  position: relative;
}

.bg-image {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -webkit-image-rendering: pixelated;
}

/* MAIN LAYOUT — matches wireframe: large blue area left-center, dark panel right */
.inv-layout {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 20px;
}

/* Blue inventory grid area */
.inv-grid-area {
  width: 55%;
  height: 75%;
  background: #6090d0;
  border: 3px solid #4070b0;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 4px;
  padding: 8px;
}

.inv-slot {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 4rem;
}
.inv-slot:hover {
  background: rgba(255,255,255,0.3);
}
.inv-slot:empty {
  font-size: 0;
}

/* Dark sidebar panel */
.inv-sidebar {
  width: 22%;
  height: 75%;
  background: #2a2a32;
  border: 3px solid #1a1a22;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  padding: 12px;
  gap: 10px;
}

.sidebar-title {
  font-size: 0.8rem;
  color: #aaa;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid #444;
  padding-bottom: 6px;
}

.selected-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.sel-icon { font-size: 4rem; text-align: center; }
.sel-name {
  font-size: 0.7rem;
  color: #ddd;
  text-align: center;
  letter-spacing: 1px;
  line-height: 1.8;
}
.sel-rarity {
  font-size: 0.65rem;
  text-align: center;
  letter-spacing: 1px;
  padding: 6px;
  border: 1px solid #555;
  margin-top: auto;
}

/* MENU BUTTON */
.menu-btn {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  background: #b8a0e0;
  color: #1a1a1a;
  border: 2px solid #9880c8;
  padding: 8px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-decoration: none;
  display: inline-block;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
}
.menu-btn:hover { background: #c8b0f0; transform: translateY(-1px); }
</style>
</head>
<body>

<img class="bg-image" src="images/inventorybg.png" alt="">

<div class="inv-layout">
  <div class="inv-grid-area">
    <div class="inv-slot" onclick="selectItem(this,'⭐','Golden Star Skin','LEGENDARY','#ffd700')">⭐</div>
    <div class="inv-slot" onclick="selectItem(this,'🪄','Arcane Wand','EPIC','#a855f7')">🪄</div>
    <div class="inv-slot" onclick="selectItem(this,'🛡️','Knight Shield','RARE','#4fc3f7')">🛡️</div>
    <div class="inv-slot" onclick="selectItem(this,'🔮','Mystic Orb','RARE','#4fc3f7')">🔮</div>
    <div class="inv-slot" onclick="selectItem(this,'🗡️','Iron Sword','COMMON','#6abf6a')">🗡️</div>
    <div class="inv-slot" onclick="selectItem(this,'⚗️','Potion Bundle','COMMON','#6abf6a')">⚗️</div>
    <div class="inv-slot" onclick="selectItem(this,'💜','Purple Crystal','EPIC','#a855f7')">💜</div>
    <div class="inv-slot" onclick="selectItem(this,'⚡','Lightning Bolt','RARE','#4fc3f7')">⚡</div>
    <div class="inv-slot" onclick="selectItem(this,'🪙','Gold Coins','COMMON','#6abf6a')">🪙</div>
    <div class="inv-slot"></div>
    <div class="inv-slot"></div>
    <div class="inv-slot"></div>
  </div>

  <div class="inv-sidebar" id="sidebar">
    <div class="sidebar-title">Selected</div>
    <div class="selected-item">
      <div class="sel-icon" id="selIcon">—</div>
      <div class="sel-name" id="selName">No item selected</div>
      <div class="sel-rarity" id="selRarity" style="color:#666">—</div>
    </div>
  </div>
</div>

<a href="main_interface.html" class="menu-btn">Menu</a>

<script>
function selectItem(el, icon, name, rarity, color) {
  document.querySelectorAll('.inv-slot').forEach(s => s.style.outline = '');
  el.style.outline = '2px solid white';
  document.getElementById('selIcon').textContent = icon;
  document.getElementById('selName').textContent = name;
  document.getElementById('selRarity').textContent = rarity;
  document.getElementById('selRarity').style.color = color;
  document.getElementById('selRarity').style.borderColor = color;
}
</script>

</body>
</html>
