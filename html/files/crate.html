<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Crate</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #c8c8c8;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* CRATE DISPLAY AREA */
.crate-area {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding-bottom: 60px;
}

/* The crate itself — teal rectangle */
.crate-box {
  width: 280px;
  height: 200px;
  background: #6fc8c0;
  border: 3px solid #4aa8a0;
  cursor: pointer;
  position: relative;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.crate-box:hover {
  transform: translateY(-3px);
  box-shadow: 5px 6px 0 rgba(0,0,0,0.25);
}
.crate-box:active {
  transform: translateY(2px);
  box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
}
.crate-label {
  font-size: 0.55rem;
  color: #1a1a1a;
  letter-spacing: 1px;
  opacity: 0.7;
}

/* Dark brown bar at bottom — represents the reward/result area */
.result-bar {
  width: 280px;
  height: 60px;
  background: #5a1a10;
  border: 3px solid #3a0a08;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
}
.result-text {
  font-size: 0.4rem;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
}

/* Shine effect on crate */
.crate-shine {
  position: absolute;
  top: 15px; left: 15px;
  width: 60px; height: 40px;
  background: rgba(255,255,255,0.2);
  pointer-events: none;
}

/* MENU BUTTON */
.menu-btn {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  background: #b8a0e0;
  color: #1a1a1a;
  border: 2px solid #9880c8;
  padding: 8px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-decoration: none;
  display: inline-block;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
}
.menu-btn:hover { background: #c8b0f0; transform: translateY(-1px); }

/* Result overlay */
.result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.result-overlay.show { display: flex; }
.result-popup {
  background: #1a1a2a;
  border: 3px solid #6fc8c0;
  padding: 2rem 3rem;
  text-align: center;
  box-shadow: 0 0 40px rgba(111,200,192,0.4);
}
.result-popup h2 {
  font-size: 0.7rem;
  color: #6fc8c0;
  margin-bottom: 1rem;
  letter-spacing: 2px;
}
.result-popup p {
  font-size: 0.5rem;
  color: #e0e0e0;
  margin-bottom: 1.5rem;
  letter-spacing: 1px;
}
.close-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  background: #6fc8c0;
  color: #1a1a1a;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="crate-area">
  <div class="crate-box" onclick="openCrate()">
    <div class="crate-shine"></div>
    <span class="crate-label">Click to Open</span>
  </div>
  <div class="result-bar">
    <span class="result-text" id="resultText">— open a crate —</span>
  </div>
</div>

<a href="main_interface.html" class="menu-btn">Menu</a>

<div class="result-overlay" id="resultOverlay">
  <div class="result-popup">
    <h2 id="rarityText">COMMON</h2>
    <p id="itemText">Iron Sword Skin</p>
    <button class="close-btn" onclick="closeResult()">Collect</button>
  </div>
</div>

<script>
const items = [
  { rarity: 'COMMON', name: 'Iron Sword Skin', color: '#6abf6a' },
  { rarity: 'COMMON', name: 'Potion Bundle', color: '#6abf6a' },
  { rarity: 'RARE', name: 'Knight Shield', color: '#4fc3f7' },
  { rarity: 'RARE', name: 'Mystic Orb', color: '#4fc3f7' },
  { rarity: 'EPIC', name: 'Arcane Wand', color: '#a855f7' },
  { rarity: 'LEGENDARY', name: 'Golden Star Skin', color: '#ffd700' },
];

function openCrate() {
  const rand = Math.random() * 100;
  let item;
  if (rand < 3) item = items[5];
  else if (rand < 15) item = items[4];
  else if (rand < 40) item = items[2 + Math.floor(Math.random()*2)];
  else item = items[Math.floor(Math.random()*2)];

  document.getElementById('rarityText').textContent = item.rarity;
  document.getElementById('rarityText').style.color = item.color;
  document.getElementById('itemText').textContent = item.name;
  document.getElementById('resultText').textContent = item.rarity + ' — ' + item.name;
  document.getElementById('resultOverlay').classList.add('show');
}
function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}
</script>

</body>
</html>
