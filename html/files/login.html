<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #d0d0d0;
  display: flex;
  flex-direction: column;
}

/* TOP NAV */
.topnav {
  width: 100%;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 12px 24px;
  background: rgba(255,255,255,0.6);
  border-bottom: 1px solid #ccc;
  position: relative;
  z-index: 10;
}
.nav-link {
  font-size: 0.5rem;
  color: #333;
  text-decoration: none;
  letter-spacing: 1px;
}
.nav-link:hover { text-decoration: underline; }

/* MAIN CONTENT */
.page-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #d0d0d0;
  padding: 2rem;
  gap: 2rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  max-width: 320px;
}

.form-label {
  font-size: 0.55rem;
  color: #333;
  letter-spacing: 1px;
  align-self: flex-start;
}

.form-input {
  width: 100%;
  height: 28px;
  background: #888;
  border: none;
  outline: none;
  padding: 4px 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.4rem;
  color: #eee;
  cursor: pointer;
}
.form-input:focus {
  background: #999;
}

.form-input.submit {
  cursor: pointer;
  background: #666;
  transition: background 0.2s;
}
.form-input.submit:hover {
  background: #555;
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="home.html" class="nav-link">Home</a>
</nav>

<div class="page-content">
  <div class="form-group">
    <label class="form-label">Login</label>
    <input type="text" class="form-input" placeholder="">
  </div>

  <div class="form-group">
    <label class="form-label">Register</label>
    <input type="submit" class="form-input submit" value="" onclick="window.location='main_interface.html'">
  </div>
</div>

</body>
</html>
