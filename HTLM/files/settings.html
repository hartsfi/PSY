<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #f080b0;
  display: flex;
  flex-direction: column;
  position: relative;
}

.bg-image {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
}

/* SETTINGS PANEL — dark, centered */
.settings-panel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1a1a20;
  border-radius: 8px;
  padding: 32px 40px;
  min-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Volume row */
.setting-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 14px;
}

.setting-label {
  font-size: 0.45rem;
  color: #e0e0e0;
  letter-spacing: 1px;
  min-width: 80px;
  white-space: nowrap;
}

/* Volume slider */
.vol-track {
  flex: 1;
  height: 12px;
  background: #333;
  border: 1px solid #555;
  position: relative;
  cursor: pointer;
}
.vol-fill {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 75%;
  background: #3ade60;
}
.vol-handle {
  position: absolute;
  top: -3px;
  left: 73%;
  width: 12px; height: 18px;
  background: #e0e0e0;
  border: 1px solid #aaa;
  cursor: grab;
}

/* ON/OFF Toggle */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.toggle-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.4rem;
  background: #60c060;
  color: #111;
  border: 2px solid #409040;
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.toggle-btn:hover { background: #70d070; }
.toggle-btn.off {
  background: #c04040;
  border-color: #a02020;
  color: #eee;
}

/* MENU BUTTON */
.menu-btn {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  background: #b8a0e0;
  color: #1a1a1a;
  border: 2px solid #9880c8;
  padding: 8px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-decoration: none;
  display: inline-block;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
  z-index: 10;
}
.menu-btn:hover { background: #c8b0f0; transform: translateY(-1px); }
</style>
</head>
<body>

<img class="bg-image" src="images/settingsbg.png" alt="">

<div class="settings-panel">
  <div class="setting-row">
    <span class="setting-label">Volume:</span>
    <div class="vol-track">
      <div class="vol-fill"></div>
      <div class="vol-handle"></div>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">Notification Popups:</span>
    <div class="toggle-wrap">
      <button class="toggle-btn" onclick="toggleNotif(this)">On</button>
    </div>
  </div>
</div>

<a href="main_interface.html" class="menu-btn">Menu</a>

<script>
function toggleNotif(btn) {
  if (btn.textContent === 'On') {
    btn.textContent = 'Off';
    btn.classList.add('off');
  } else {
    btn.textContent = 'On';
    btn.classList.remove('off');
  }
}
</script>

</body>
</html>
