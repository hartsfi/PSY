<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #c4c8cc;
  display: flex;
  flex-direction: column;
  position: relative;
}

.bg-image {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -webkit-image-rendering: pixelated;
}

/* PROFILE CARD — green rounded rectangle matching wireframe */
.profile-card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #4a8a60;
  border-radius: 20px;
  padding: 28px 32px 28px 24px;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 22px;
  min-width: 420px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* Avatar circle with the thief image */
.avatar-wrap {
  flex-shrink: 0;
  position: relative;
}
.avatar-circle {
  width: 80px; height: 80px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid #6aaa80;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  background: #2a3a30;
}
.avatar-circle img {
  width: 100%; height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
}
/* Small badge/dot */
.avatar-badge {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #ffd700;
  border: 2px solid #4a8a60;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5rem;
}

/* Profile info text */
.profile-info {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.profile-name {
  font-size: 0.65rem;
  color: #ffffff;
  letter-spacing: 1px;
  line-height: 1.4;
}

.profile-stat {
  font-size: 0.38rem;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.8px;
  line-height: 2;
}
</style>
</head>
<body>

<img class="bg-image" src="images/profilebg.png" alt="">

<div class="profile-card">
  <div class="avatar-wrap">
    <div class="avatar-circle">
      <img src="images/avatar.png" alt="UnusualPheasant918">
    </div>
    <div class="avatar-badge">★</div>
  </div>
  <div class="profile-info">
    <div class="profile-name">UnusualPheasant918</div>
    <div class="profile-stat">Crates opened: 43</div>
    <div class="profile-stat">Bit Balance: 163</div>
    <div class="profile-stat">Leaderboard Rank: 7</div>
  </div>
</div>

<a href="main_interface.html" class="menu-btn">Menu</a>

<style>
.menu-btn {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  background: #b8a0e0;
  color: #1a1a1a;
  border: 2px solid #9880c8;
  padding: 8px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-decoration: none;
  display: inline-block;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
}
.menu-btn:hover { background: #c8b0f0; transform: translateY(-1px); }
</style>

</body>
</html>
