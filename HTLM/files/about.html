<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — About us</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #d8d8d8;
  display: flex;
  flex-direction: column;
}

/* TOP NAV */
.topnav {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: rgba(255,255,255,0.6);
  position: relative;
  z-index: 10;
  border-bottom: 1px solid #ccc;
}
.nav-link {
  font-size: 0.5rem;
  color: #333;
  text-decoration: none;
  letter-spacing: 1px;
}
.nav-link:hover { text-decoration: underline; }

/* MAIN CONTENT */
.page-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
}
.bg-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -webkit-image-rendering: pixelated;
  transform: scale(1.02); /* slight upscale forces pixelation to show */
}

.about-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(1.8rem, 5vw, 3.5rem);
  color: #1a1a1a;
  letter-spacing: 2px;
  margin-bottom: 1.5rem;
  text-align: center;
  line-height: 1.3;
  position: relative;
  z-index: 1;
}

.about-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  color: #555;
  letter-spacing: 1px;
  text-align: center;
  line-height: 2;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="home.html" class="nav-link">Home</a>
  <a href="login.html" class="nav-link">Login</a>
</nav>

<div class="page-content">
  <img class="bg-img" src="images/aboutimg.png" alt="">
  <h1 class="about-title">About us</h1>
  <p class="about-sub">Super awesome<br>project.</p>
</div>

</body>
</html>
